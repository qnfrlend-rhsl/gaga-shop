<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가가 춘천사랑 농축임수센터</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 헤더 -->
<header class="top-header">
    <div class="logo-box">
        <img src="assets/로고-2.png" alt="로고" class="logo">
        <h1 class="site-name">가가 춘천사랑 농축임수센터</h1>

    </div>
</header>

<!-- 🛍️ 상품 -->
<main>
    <section class="product">
        <h2>우리의 제품</h2>
        <div id="product-list" class="product-list"></div>
    </section>
</main>

<!-- 🛒 장바구니 버튼 -->
<button id="cart-toggle" class="cart-toggle">🛒</button>


<!-- 🛒 장바구니 -->
<div class="cart-box">

    <h2>🛒 장바구니</h2>

    <!-- 메시지 -->
    <p id="cart-message" class="cart-message"></p>

    <!-- 상품 리스트 -->
    <div id="cart-items"></div>

    <!-- 총합 -->
    <h3 id="cart-total">총합: 0원</h3>

    <!-- 버튼 -->
    <button id="clear-cart">장바구니 비우기</button>
    <button class="pay-btn">결제하기</button>

    <!-- 주문 내역 -->
    <hr>
    <h3>🧾 주문 내역</h3>
    <div id="order-history"></div>

    <!-- 💳 결제 패널 -->
    <div id="pay-panel" class="pay-panel">
        <div class="pay-content">

            <!-- 🏦 판매자 정보 (🔥 추가) -->
            <div class="seller-info">
                <h3>🏦 판매자 계좌 정보</h3>
                <p>국민은행 123-456-7890</p>
                <p>예금주: 가가춘천농축임수센터</p>
            </div>

            <!-- 구매자 정보 -->
            <h3>결제 정보</h3>

            <input type="text" id="buyer-name" placeholder="이름">
            <input type="text" id="buyer-address" placeholder="주소">
            <input type="text" id="buyer-phone" placeholder="전화번호">

            <h4 id="pay-total"></h4>

            <p id="pay-message"></p>

            <p id="order-status" class="order-status"></p>

            <button id="pay-confirm">주문 완료</button>
            <button id="pay-close">닫기</button>


        </div>
    </div>

</div>

<!-- 🪟 상품 모달 -->
<div id="modal" class="modal">
    <div class="modal-content">

        <span id="modal-close" class="close">&times;</span>

        <img id="modal-img" alt="상품 이미지">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
        <h3 id="modal-price"></h3>

        <button id="modal-cart-btn">장바구니 추가</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
